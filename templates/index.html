<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>

        }
        .container {
            max-width: 600px;
            margin: auto;
            padding: 30px;
            background: #1e293b;
            border-radius: 12px;

        .status {
            display: inline-block;
            margin-top: 15px;
            padding: 8px 16px;
            background: #065f46;
            color: #34d399;
            border-radius: 20px;
            font-weight: bold;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚀 لوحة تحكم OBT-System</h1>
        <p>الموقع والداشبورد يعملان بنجاح تام على منصة Railway!</p>

</html>
